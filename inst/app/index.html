<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>lllmr</title>
  <link rel="stylesheet" href="style.css">
  <!-- Markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked@14.0.0/marked.min.js"></script>
  <!-- Syntax highlighting -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css" id="hljs-light">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css" id="hljs-dark" disabled>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/core.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/r.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/sql.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/markdown.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/xml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/css.min.js"></script>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="logo">lllmr</div>
      <div class="model-selector">
        <select id="provider-select" title="Select provider">
          <option value="ollama">Ollama</option>
          <option value="claude">Claude API</option>
        </select>
        <select id="model-select" title="Select model">
          <option value="">loading...</option>
        </select>
      </div>
    </div>
    <div class="header-right">
      <button id="export-btn" class="btn-icon" title="Export chat as markdown">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M8 2v8M5 7l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2 11v1a2 2 0 002 2h8a2 2 0 002-2v-1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
      <button id="new-chat-btn" class="btn-icon" title="New conversation">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M3 8h10M8 3v10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- API key bar (shown when Claude provider is selected) -->
  <div id="api-key-bar" class="api-key-bar hidden">
    <div class="api-key-bar-inner">
      <span class="api-key-label">Anthropic API key:</span>
      <input type="password" id="api-key-input" placeholder="sk-ant-..." class="api-key-input"/>
      <button id="api-key-save" class="btn-tiny-text">Save</button>
      <span id="api-key-status" class="api-key-status"></span>
    </div>
  </div>

  <!-- Context bar -->
  <div id="context-bar" class="context-bar">
    <div class="context-bar-inner">
      <span class="context-icon">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.5"/>
          <path d="M8 5v3l2 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </span>
      <span id="context-summary" class="context-summary">Gathering context...</span>
    </div>
  </div>

  <!-- Chat area -->
  <main class="chat-area" id="chat-area">
    <div class="welcome" id="welcome">
      <div class="welcome-logo">lllmr</div>
      <p class="welcome-sub">Local LLM, right inside RStudio</p>
    </div>
  </main>

  <!-- Input area -->
  <footer class="input-area">
    <div class="input-wrapper">
      <textarea
        id="message-input"
        placeholder="Ask lllmr anything..."
        rows="1"
        autofocus
      ></textarea>
      <button id="stop-btn" class="stop-btn hidden" title="Stop generation">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor"/>
        </svg>
      </button>
      <button id="send-btn" class="send-btn" title="Send message" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M7 11l5-5 5 5M12 6v13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <div class="input-footer">
      <span class="input-hint" id="provider-hint">lllmr runs locally via Ollama — your data never leaves your machine</span>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
